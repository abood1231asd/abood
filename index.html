<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8f1f | ABOOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --color-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--color-bg);
            color: #000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; perspective: 2000px;
        }

        #cursor { width: 10px; height: 10px; background: #000; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.15s ease; }
        #cursor-follower { width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.25s ease; }

        #bgVideo {
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            z-index: -1; transform: translate(-50%, -50%); object-fit: cover;
            filter: brightness(0.4);
        }

        #rainCanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .SurfaceMain { background: transparent; text-align: center; width: 100%; max-width: 950px; z-index: 10; transform: scale(0.8); transition: transform 0.2s ease-out; }

        .ProfileName { font-size: 7rem; font-weight: 900; text-transform: uppercase; color: #000; letter-spacing: -6px; line-height: 0.8; margin-bottom: 2rem; }

        .ProfileBio { 
            color: #000; font-size: 1.2rem; font-weight: 600;
            letter-spacing: 15px; margin-bottom: 6rem; text-transform: uppercase;
        }

        /* --- UPGRADED MUSIC PLAYER --- */
        .MusicPlayer { width: 100%; max-width: 480px; margin: 0 auto; color: #000; padding-bottom: 20px; }
        .PlayerContent { padding: 20px 0; display: flex; align-items: center; justify-content: space-between; }
        .TrackTitle { font-size: 1.8rem; font-weight: 900; }

        .PlayButton { width: 50px; height: 50px; background: transparent; border: 1.5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s ease; }
        .PlayButton svg { fill: #000; width: 20px; }
        .PlayButton:hover { background: #000; }
        .PlayButton:hover svg { fill: #fff; }

        /* BETTER MUSIC LINE (GLOWING WAVEFORM STYLE) */
        .BottomProgress { 
            width: 100%; height: 3px; background: rgba(0, 0, 0, 0.1); 
            border-radius: 10px; overflow: visible; position: relative; 
        }
        .BottomProgress__fill { 
            height: 100%; width: 0%; background: #000; 
            border-radius: 10px; position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.4); /* Glow effect */
            transition: width 0.1s linear;
        }
        /* Neon-style pulse dot at the end of the line */
        .BottomProgress__fill::after {
            content: ''; position: absolute; right: -5px; top: -4px;
            width: 11px; height: 11px; background: #000; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: linePulse 1.5s infinite;
        }

        @keyframes linePulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- ICON LOGIC (UNTOUCHED) --- */
        .SocialConnector { margin-top: 70px; display: flex; justify-content: center; gap: 50px; }
        .RealisticIcon { width: 42px; height: 42px; transition: 0.5s ease; filter: grayscale(1) opacity(0.6); }
        .SocialConnector__link:hover .RealisticIcon { transform: translateY(-15px); filter: grayscale(0) opacity(1); }

        .AppEntry { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1); }
        .AppEntry--hidden { opacity: 0; pointer-events: none; transform: scale(1.5); }
        .EntryText { color: #fff; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 40px; animation: entryBreath 3s ease-in-out infinite; text-indent: 40px; }

        @keyframes entryBreath { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        
        .PageFooter { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 60px; z-index: 500; font-size: 0.95rem; font-weight: 900; }
        .ViewCount { display: flex; align-items: center; gap: 10px; }
        .ViewCount svg { fill: #000; width: 16px; }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <div class="AppEntry" id="entryOverlay">
        <p class="EntryText">CLICK TO ENTER</p>
    </div>
    
    <video id="bgVideo" loop playsinline muted>
        <source src="123.mp4" type="video/mp4">
    </video>

    <audio id="mainAudio" loop>
        <source src="321.mp4" type="audio/mpeg">
    </audio>

    <canvas id="rainCanvas"></canvas>

    <div class="SurfaceMain" id="mainSurface">
        <h1 class="ProfileName">ABOOD</h1>
        <p class="ProfileBio">Engineering • Security • Intelligence</p>

        <div class="MusicPlayer">
            <div class="PlayerContent">
                <div style="text-align: left;">
                    <div class="TrackTitle">I MISS HER</div>
                </div>
                <div class="PlayButton" id="playBtn">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
            </div>
            <div class="BottomProgress"><div class="BottomProgress__fill" id="mediaBar"></div></div>
        </div>

        <div class="SocialConnector">
            <a href="https://steamcommunity.com/profiles/76561199844529373/" target="_blank" class="SocialConnector__link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" class="RealisticIcon" alt="Steam">
            </a>
            <a href="https://www.snapchat.com/add/xt9s6" target="_blank" class="SocialConnector__link">
                <img src="https://www.vectorlogo.zone/logos/snapchat/snapchat-icon.svg" class="RealisticIcon" alt="Snapchat">
            </a>
            <a href="https://www.instagram.com/j2_35" target="_blank" class="SocialConnector__link">
                <img src="https://www.vectorlogo.zone/logos/instagram/instagram-icon.svg" class="RealisticIcon" alt="Instagram">
            </a>
            <a href="https://revolut.me/ab000d" target="_blank" class="SocialConnector__link">
                <img src="https://www.vectorlogo.zone/logos/revolut/revolut-icon.svg" class="RealisticIcon" alt="Revolut" style="filter: brightness(0);">
            </a>
        </div>
    </div>

    <div class="PageFooter">
        <div class="ViewCount">
            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            <span>3,273</span>
        </div>
        <div class="Watermark">MADE BY ABOOD</div>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const video = document.getElementById('bgVideo');
        const overlay = document.getElementById('entryOverlay');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const mediaBar = document.getElementById('mediaBar');
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        const surface = document.getElementById('mainSurface');

        video.pause();

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => {
                follower.style.left = (e.clientX - 15) + 'px';
                follower.style.top = (e.clientY - 15) + 'px';
            }, 40);
            
            const x = (window.innerWidth / 2 - e.clientX) / 45;
            const y = (window.innerHeight / 2 - e.clientY) / 45;
            surface.style.transform = `scale(0.8) rotateY(${x}deg) rotateX(${y}deg)`;
        });

        overlay.onclick = () => { 
            overlay.classList.add('AppEntry--hidden'); 
            audio.play(); 
            video.play(); 
        };

        playBtn.onclick = () => {
            if(audio.paused) { 
                audio.play(); video.play();
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; 
            }
            else { 
                audio.pause(); video.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; 
            }
        };

        audio.ontimeupdate = () => { if(audio.duration) mediaBar.style.width = (audio.currentTime/audio.duration*100)+'%'; };

        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let rain = [];

        const init = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            rain = Array.from({length: 450}, () => ({ 
                x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
                w: Math.random()*2 + 1, h: Math.random()*15 + 10,
                v: Math.random()*10 + 10, o: Math.random()*0.5 + 0.1 
            }));
        };

        const loop = () => {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            rain.forEach(r => {
                r.y += r.v;
                if(r.y > canvas.height) r.y = -20;
                ctx.fillStyle = `rgba(0, 0, 0, ${r.o})`; 
                ctx.fillRect(r.x, r.y, r.w, r.h);
            });
            requestAnimationFrame(loop);
        };
        window.onresize = init; init(); loop();
    </script>
</body>
</html>
